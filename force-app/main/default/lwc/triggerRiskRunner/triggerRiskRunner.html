<template>
  <!--
    Trigger Risk Analyzer runner UI.
    Organizes trigger selection, run actions, Executive Signal,
    Release Gate, findings, and detail modal sections.
  -->
  <div class="traShell">
    <div class="traTopbar">
      <div class="traBrand">
        <div class="traLogoMark" aria-hidden="true">
          <svg
            class="traLogoSvg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 64 64"
            role="img"
            aria-label="Trigger Risk Analyzer"
          >
            <defs>
              <linearGradient id="tra-shield" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#0b5cab"></stop>
                <stop offset="1" stop-color="#013668"></stop>
              </linearGradient>
            </defs>
            <path
              d="M32 4 L56 12 V32 C56 46 45 56 32 60 C19 56 8 46 8 32 V12 Z"
              fill="url(#tra-shield)"
            ></path>
            <path
              d="M34 16 L22 36 H30 L26 50 L42 28 H34 Z"
              fill="#ffd84d"
            ></path>
            <path
              d="M32 4 L56 12 V32 C56 46 45 56 32 60 C19 56 8 46 8 32 V12 Z"
              fill="none"
              stroke="rgba(255,255,255,.18)"
              stroke-width="1.5"
            ></path>
          </svg>
        </div>
        <div>
          <div class="traProductTitle">Trigger Risk Analyzer</div>
          <div class="traProductSubtitle">
            Ship triggers with confidence. Defend every release.
          </div>
        </div>
      </div>

      <div class="traNav" role="tablist" aria-label="TRA navigation">
        <button class="traNavButton traNavButtonActive" type="button">
          Runner
        </button>
        <button class="traNavButton" type="button" disabled>Dashboard</button>
      </div>

      <div class="traStatusPill">
        <span class="traStatusDot"></span>
        <template if:true={isRunComplete}>Run complete</template>
        <template if:false={isRunComplete}>
          <template if:true={showRunWorkspace}>Running</template>
          <template if:false={showRunWorkspace}>Ready</template>
        </template>
      </div>
    </div>

    <div class="traMainCard">
      <div class="slds-p-around_medium">
        <template if:true={showSetupPanel}>
          <div class="traPanelHeader">
            <h1 class="traPanelTitle">New analysis run</h1>
          </div>

          <div class="slds-grid slds-wrap slds-gutters traInputGrid">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
              <lightning-input
                label="Release Label"
                value={releaseLabel}
                onchange={handleReleaseLabelChange}
              >
              </lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
              <lightning-input
                type="search"
                label="Search Triggers"
                placeholder="Type to filter triggers"
                value={triggerSearchText}
                onchange={handleTriggerSearch}
              >
              </lightning-input>
            </div>
          </div>

          <template if:true={hasSelectedTriggers}>
            <div class="selectedTriggers slds-m-top_small">
              <div class="selectedTriggersTitle">
                Selected Triggers ({selectedTriggersCount})
              </div>

              <div class="selectedTriggersPills">
                <template for:each={selectedTriggersList} for:item="trg">
                  <span key={trg} class="selectedPill">
                    {trg}
                    <button
                      type="button"
                      class="selectedPillRemove"
                      data-name={trg}
                      onclick={handleRemoveTrigger}
                      title="Remove"
                    >
                      ✕
                    </button>
                  </span>
                </template>
              </div>
            </div>
          </template>

          <template if:true={triggers}>
            <div class="traTriggerList slds-m-top_medium">
              <template for:each={triggerOptions} for:item="t">
                <lightning-input
                  key={t.name}
                  type="checkbox"
                  label={t.name}
                  data-name={t.name}
                  checked={t.checked}
                  onchange={handleToggle}
                >
                </lightning-input>
              </template>
            </div>
          </template>

          <template if:true={isLoading}>
            <div class="slds-m-top_small">
              <lightning-spinner
                size="small"
                alternative-text="Loading analysis"
              ></lightning-spinner>
            </div>
          </template>

          <div class="slds-m-top_medium slds-grid slds-gutters slds-wrap">
            <div class="slds-col slds-size_1-of-1">
              <div class="traRunActionRow">
                <lightning-button
                  label="Run Analysis"
                  variant="brand"
                  title="Run Trigger Risk Analyzer on the selected triggers"
                  onclick={runAnalysis}
                  disabled={isRunDisabled}
                >
                </lightning-button>
                <template if:true={isRunDisabled}>
                  <div class="traRunHelpInline">
                    Select at least one trigger to run analysis.
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
        <template if:true={showRunWorkspace}>
          <div class="releaseSummaryStrip">
            <div class="releaseSummaryCell releaseSummaryCellMain">
              <div class="releaseSummaryLabel">Release</div>
              <div class="releaseSummaryValue releaseSummaryTitle">
                {releaseLabel}
              </div>
              <div class="releaseSummarySubtext">
                {runStatusLabel} · {runWorkspaceMessage}
              </div>
            </div>

            <div class="releaseSummaryCell">
              <div class="releaseSummaryLabel">Release Gate</div>
              <div class="releaseSummaryValue">
                <template if:true={isRunComplete}>
                  {releaseGateDecisionLabel}
                </template>
                <template if:false={isRunComplete}>Analyzing...</template>
              </div>
            </div>

            <div class="releaseSummaryCell">
              <div class="releaseSummaryLabel">High</div>
              <div class="releaseSummaryValue releaseSummaryHigh">
                <template if:true={isRunComplete}>{highCount}</template>
                <template if:false={isRunComplete}>—</template>
              </div>
            </div>

            <div class="releaseSummaryCell">
              <div class="releaseSummaryLabel">Medium</div>
              <div class="releaseSummaryValue releaseSummaryMedium">
                <template if:true={isRunComplete}>{mediumCount}</template>
                <template if:false={isRunComplete}>—</template>
              </div>
            </div>

            <div class="releaseSummaryCell">
              <div class="releaseSummaryLabel">Low</div>
              <div class="releaseSummaryValue releaseSummaryLow">
                <template if:true={isRunComplete}>{lowCount}</template>
                <template if:false={isRunComplete}>—</template>
              </div>
            </div>
          </div>
        </template>
        <template if:true={showRunWorkspace}>
          <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
            <aside class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
              <div class="slds-box slds-theme_default">
                <div
                  class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
                >
                  <div>
                    <div class="slds-text-title_caps slds-text-color_weak">
                      Run Summary
                    </div>
                    <template if:true={runSummaryMetaLabel}>
                      <div
                        class="slds-text-color_weak slds-text-body_small slds-m-top_xx-small"
                      >
                        {runSummaryMetaLabel}
                      </div>
                    </template>
                  </div>
                </div>

                <div class="slds-m-top_medium slds-border_top slds-p-top_small">
                  <div
                    class="slds-grid slds-grid_align-spread slds-m-bottom_x-small"
                  >
                    <span class="slds-text-color_weak">Status</span>
                    <strong>{runSummaryStatusLabel}</strong>
                  </div>

                  <div
                    class="slds-grid slds-grid_align-spread slds-m-bottom_x-small"
                  >
                    <span class="slds-text-color_weak">Triggers</span>
                    <strong>{selectedTriggersCount}</strong>
                  </div>

                  <div
                    class="slds-grid slds-grid_align-spread slds-m-bottom_x-small"
                  >
                    <span class="slds-text-color_weak">Overall risk</span>
                    <strong>
                      <template if:true={isRunComplete}>{overallRisk}</template>
                      <template if:false={isRunComplete}>—</template>
                    </strong>
                  </div>

                  <div
                    class="slds-grid slds-grid_align-spread slds-m-bottom_x-small"
                  >
                    <span class="slds-text-color_weak">Findings</span>
                    <strong>
                      <template if:true={isRunComplete}
                        >{findingsCount}</template
                      >
                      <template if:false={isRunComplete}>—</template>
                    </strong>
                  </div>

                  <div
                    class="slds-grid slds-grid_align-spread slds-m-top_x-small"
                  >
                    <span class="slds-text-color_weak">Updated</span>
                    <strong>{runUpdatedDisplay}</strong>
                  </div>
                  <template if:true={runId}>
                    <p class="slds-m-top_medium">
                      <a href={runUrl} target="_blank">Open Run</a>
                    </p>
                  </template>
                </div>

                <div
                  class="runSummaryActions slds-m-top_medium slds-p-top_small slds-border_top"
                >
                  <div class="slds-grid slds-wrap slds-gutters_x-small">
                    <div class="slds-col slds-size_1-of-1">
                      <lightning-button
                        class="actionBtn"
                        label="Copy Summary"
                        stretch
                        title="Copy a shareable summary for tickets, Slack, or email"
                        onclick={copySummaryToClipboard}
                        disabled={disableExport}
                      >
                      </lightning-button>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-m-top_x-small">
                      <lightning-button
                        class="actionBtn"
                        label="Copy Release Decision"
                        stretch
                        title="Copy the executive release decision (CAB / audit friendly)"
                        onclick={copyReleaseDecisionToClipboard}
                        disabled={disableExport}
                      >
                      </lightning-button>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-m-top_x-small">
                      <lightning-button
                        class="actionBtn"
                        label="Export CSV"
                        stretch
                        title="Export findings to CSV with Executive Signal and Release Gate details"
                        onclick={exportCsv}
                        disabled={disableExport}
                      >
                      </lightning-button>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-m-top_x-small">
                      <lightning-button
                        class="actionBtn"
                        label="Export Decision (.txt)"
                        stretch
                        title="Export a release decision text file for CAB or audit evidence"
                        onclick={exportReleaseDecision}
                        disabled={disableExport}
                      >
                      </lightning-button>
                    </div>
                  </div>
                </div>

                <div
                  class="runSummaryWorkflowRow workflowControls slds-m-top_medium slds-p-top_medium slds-border_top"
                >
                  <lightning-button
                    label="New Run"
                    variant="brand"
                    onclick={handleNewRun}
                  >
                  </lightning-button>

                  <div class="runSummaryWorkflowMeta">
                    <template if:true={isStartingRun}>
                      <div class="runSummaryWorkflowText slds-text-color_weak">
                        Starting run…
                      </div>
                    </template>

                    <template if:false={isStartingRun}>
                      <template if:true={isPolling}>
                        <div
                          class="runSummaryWorkflowText slds-text-color_weak"
                        >
                          Auto-refreshing…
                        </div>
                      </template>

                      <template if:false={isPolling}>
                        <lightning-button-icon
                          icon-name="utility:refresh"
                          alternative-text="Refresh run status and findings"
                          title="Refresh run status and findings"
                          onclick={refreshRun}
                          disabled={isLoading}
                        >
                        </lightning-button-icon>
                      </template>
                    </template>
                  </div>
                </div>
              </div>
            </aside>

            <main class="slds-col slds-size_1-of-1 slds-large-size_3-of-4">
              <template if:false={isRunComplete}>
                <div class="slds-box slds-theme_default">
                  <div
                    class="inlineSpinnerRow slds-grid slds-grid_vertical-align-center"
                  >
                    <div class="inlineSpinner">
                      <lightning-spinner
                        size="small"
                        alternative-text="Running analysis"
                      ></lightning-spinner>
                    </div>
                    <div class="slds-m-left_small slds-text-color_weak">
                      {runningPanelMessage}
                    </div>
                  </div>
                </div>
              </template>

              <template if:true={isRunComplete}>
                <div class="completedResultsPanel">
                  <template if:true={hasReleaseGate}>
                    <div class={releaseGateBannerClass}>
                      <div class="releaseGateBannerMain">
                        <div class="releaseGateBannerTitle">
                          {releaseGateBannerTitle}
                        </div>
                        <div class="releaseGateBannerMeta">
                          {releaseGateBannerMeta}
                        </div>
                      </div>

                      <template if:true={meaningfulImpactChips}>
                        <div class="releaseGateBannerChips">
                          <template
                            for:each={meaningfulImpactChips}
                            for:item="c"
                          >
                            <span key={c} class="metaChip">{c}</span>
                          </template>
                        </div>
                      </template>
                    </div>

                    <div class="releaseGateEvidencePendingTabs slds-hide">
                      <template if:true={hasReleaseGate}>
                        <span class={releaseGateBadgeClass}>
                          {releaseGateDecisionLabel}
                        </span>
                      </template>

                      <div class="metaRow slds-m-top_x-small">
                        <template if:true={gatePolicyProfile}>
                          <span class="metaChip"
                            >Policy: {gatePolicyProfile}</span
                          >
                        </template>

                        <template if:true={gateVersion}>
                          <span class="metaChip">Version: {gateVersion}</span>
                        </template>
                      </div>

                      <template if:true={hasGateRationale}>
                        <div class="slds-m-top_small">
                          <p class="slds-text-title_bold">Rationale</p>
                          <template for:each={gateRationaleLines} for:item="l">
                            <div key={l} class="slds-m-top_xx-small">• {l}</div>
                          </template>
                        </div>
                      </template>

                      <template if:true={hasGateRequiredFixes}>
                        <div class="slds-m-top_small">
                          <p class="slds-text-title_bold">
                            Required Fixes (to unblock)
                          </p>
                          <template
                            for:each={gateRequiredFixLines}
                            for:item="l"
                          >
                            <div key={l} class="slds-m-top_xx-small">• {l}</div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>

                  <div class="completedTabs">
                    <button
                      class={findingsTabClass}
                      type="button"
                      data-tab="findings"
                      onclick={handleCompletedTabClick}
                    >
                      <span>Findings</span>
                      <span class="completedTabCount">{findingsCount}</span>
                    </button>

                    <button
                      class={rationaleTabClass}
                      type="button"
                      data-tab="rationale"
                      onclick={handleCompletedTabClick}
                    >
                      <span>Rationale</span>
                      <span class="completedTabCount"
                        >{gateRationaleCount}</span
                      >
                    </button>

                    <button
                      class={requiredFixesTabClass}
                      type="button"
                      data-tab="requiredFixes"
                      onclick={handleCompletedTabClick}
                    >
                      <span>Required Fixes</span>
                      <span class="completedTabCount"
                        >{gateRequiredFixCount}</span
                      >
                    </button>

                    <button
                      class={topRisksTabClass}
                      type="button"
                      data-tab="topRisks"
                      onclick={handleCompletedTabClick}
                    >
                      <span>Top Risks</span>
                      <span class="completedTabCount">{topRisksCount}</span>
                    </button>
                  </div>
                  <template if:true={isFindingsTabActive}>
                    <div
                      class="completedFilters slds-grid slds-wrap slds-gutters"
                    >
                      <div
                        class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12"
                      >
                        <lightning-combobox
                          label="Severity"
                          variant="label-hidden"
                          value={severityFilter}
                          options={severityOptions}
                          onchange={handleSeverityFilter}
                        >
                        </lightning-combobox>
                      </div>

                      <div
                        class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12"
                      >
                        <lightning-combobox
                          label="Category"
                          variant="label-hidden"
                          value={categoryFilter}
                          options={categoryOptions}
                          onchange={handleCategoryFilter}
                        >
                        </lightning-combobox>
                      </div>

                      <div
                        class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12"
                      >
                        <lightning-input
                          label="Search"
                          variant="label-hidden"
                          value={searchText}
                          onchange={handleSearchChange}
                          placeholder="Search trigger, rule, or message"
                        >
                        </lightning-input>
                      </div>
                    </div>

                    <template if:true={showTable}>
                      <div class="completedTableWrap">
                        <lightning-datatable
                          key-field="itemId"
                          data={filteredItems}
                          columns={columns}
                          onrowaction={handleRowAction}
                          hide-checkbox-column
                        >
                        </lightning-datatable>
                      </div>
                    </template>

                    <template if:false={showTable}>
                      <div class="slds-m-top_medium slds-text-color_weak">
                        <template if:false={hasAnyFindings}>
                          No findings detected. This trigger passed all active
                          rules.
                        </template>
                        <template if:true={hasAnyFindings}>
                          No findings match the current filters.
                        </template>
                      </div>
                    </template>
                  </template>
                  <template if:true={isRationaleTabActive}>
                    <div class="completedTabPanel">
                      <template if:true={hasGateRationale}>
                        <ol class="completedTabList">
                          <template
                            for:each={gateRationaleLines}
                            for:item="line"
                          >
                            <li key={line} class="completedTabListItem">
                              {line}
                            </li>
                          </template>
                        </ol>
                      </template>
                      <template if:false={hasGateRationale}>
                        <div class="slds-text-color_weak">
                          No rationale details available.
                        </div>
                      </template>
                    </div>
                  </template>

                  <template if:true={isRequiredFixesTabActive}>
                    <div class="completedTabPanel">
                      <template if:true={hasGateRequiredFixes}>
                        <ol class="completedTabList">
                          <template
                            for:each={gateRequiredFixLines}
                            for:item="line"
                          >
                            <li key={line} class="completedTabListItem">
                              {line}
                            </li>
                          </template>
                        </ol>
                      </template>
                      <template if:false={hasGateRequiredFixes}>
                        <div class="slds-text-color_weak">
                          No required fixes.
                        </div>
                      </template>
                    </div>
                  </template>

                  <template if:true={isTopRisksTabActive}>
                    <div class="completedTabPanel">
                      <template if:true={topRisks}>
                        <template if:true={topRisks.length}>
                          <ol class="completedTabList">
                            <template for:each={topRisks} for:item="risk">
                              <li key={risk} class="completedTabListItem">
                                {risk}
                              </li>
                            </template>
                          </ol>
                        </template>
                      </template>
                      <template if:false={topRisks.length}>
                        <div class="slds-text-color_weak">
                          No top risks available.
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </main>
          </div>
        </template>
        <!-- Modal -->
        <template if:true={isModalOpen}>
          <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open"
          >
            <div class="slds-modal__container">
              <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">{detail.triggerName}</h2>

                <div class="metaRow">
                  <span class={detailSeverityBadgeClass}
                    >{detail.severity}</span
                  >

                  <template if:true={detail.ruleLabel}>
                    <span class="metaChip">{detail.ruleLabel}</span>
                  </template>

                  <template if:true={detailRuleKeys}>
                    <span class="metaChip">{detailRuleKeys}</span>
                  </template>

                  <template if:true={detail.category}>
                    <span class="metaChip">{detail.category}</span>
                  </template>
                </div>
              </header>

              <div class="slds-modal__content slds-p-around_medium">
                <template if:true={detailLoading}>
                  <lightning-spinner
                    size="small"
                    alternative-text="Loading details"
                  ></lightning-spinner>
                </template>

                <template if:true={detail}>
                  <template if:true={detail.message}>
                    <div class="slds-m-top_medium">
                      <p class="slds-text-title_bold">Message</p>
                      <div class="slds-box slds-theme_default">
                        {detail.message}
                      </div>
                    </div>
                  </template>

                  <template if:true={detail.recommendation}>
                    <div class="slds-m-top_medium">
                      <p class="slds-text-title_bold">Recommendation</p>
                      <div class="slds-box slds-theme_default">
                        {detail.recommendation}
                      </div>
                    </div>
                  </template>

                  <template if:true={snippetLines}>
                    <div class="slds-m-top_medium">
                      <p class="slds-text-title_bold">Snippet</p>
                      <div class="slds-box slds-theme_default snippetBox">
                        <template for:each={snippetLines} for:item="l">
                          <div key={l.key} class={l.cssClass}>{l.text}</div>
                        </template>
                      </div>
                    </div>
                  </template>
                </template>
              </div>

              <footer class="slds-modal__footer">
                <lightning-button
                  label="Close"
                  onclick={closeModal}
                ></lightning-button>
              </footer>
            </div>
          </section>

          <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={errorMsg}>
          <div class="slds-m-top_medium slds-text-color_error">{errorMsg}</div>
        </template>
      </div>
    </div>
  </div>
</template>
